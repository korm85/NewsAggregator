name: News Dedup

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch:          # manual trigger button in GitHub UI

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run deduplicator
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEDUP_WINDOW_HOURS: ${{ vars.DEDUP_WINDOW_HOURS || '48' }}
          SIMILARITY_THRESHOLD: ${{ vars.SIMILARITY_THRESHOLD || '0.6' }}
          NARRATIVE_BATCH_LIMIT: ${{ vars.NARRATIVE_BATCH_LIMIT || '20' }}
        run: python run.py

      - name: Save state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/seen.json state/stories.json
          git diff --cached --quiet || git commit -m "chore: update dedup state [skip ci]"
          git push
